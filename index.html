<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Arbeitszeit Rechner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,300;9..144,600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0f14; --card: #161820; --card2: #1c1e28; --border: #2a2d3a;
    --accent: #c8f060; --accent2: #60d4f0; --accent3: #f0a060; --accent4: #c060f0;
    --text: #e8eaf0; --muted: #6b6f80; --red: #f06060;
  }
  body { background:var(--bg); color:var(--text); font-family:'DM Mono',monospace; min-height:100dvh; display:flex; flex-direction:column; align-items:center; padding:20px 14px 50px; overflow-x:hidden; }
  header { text-align:center; margin-bottom:18px; }
  header h1 { font-family:'Fraunces',serif; font-size:clamp(1.5rem,5vw,2.2rem); font-weight:300; letter-spacing:-0.02em; color:var(--text); }
  header h1 span { color:var(--accent); }
  header p { color:var(--muted); font-size:0.7rem; margin-top:4px; letter-spacing:0.08em; }

  .tabs { display:flex; gap:6px; width:100%; max-width:440px; margin-bottom:16px; }
  .tab { flex:1; padding:9px 4px; border-radius:10px; border:1px solid var(--border); background:var(--card); color:var(--muted); font-family:'DM Mono',monospace; font-size:0.6rem; letter-spacing:0.04em; text-transform:uppercase; cursor:pointer; transition:all 0.2s; text-align:center; }
  .tab.active { background:var(--accent); color:#0d0f14; border-color:var(--accent); font-weight:500; }

  .panel { display:none; width:100%; max-width:440px; }
  .panel.active { display:block; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:18px; width:100%; }

  .field { margin-bottom:13px; }
  .field label { display:block; font-size:0.6rem; letter-spacing:0.1em; color:var(--muted); text-transform:uppercase; margin-bottom:5px; }
  .dot { display:inline-block; width:6px; height:6px; border-radius:50%; margin-right:6px; vertical-align:middle; position:relative; top:-1px; }
  .dot-green { background:var(--accent); } .dot-blue { background:var(--accent2); } .dot-orange { background:var(--accent3); }

  input[type="time"], input[type="date"], input[type="text"] {
    width:100%; background:var(--bg); border:1px solid var(--border); border-radius:9px;
    color:var(--text); font-family:'DM Mono',monospace; font-size:0.95rem;
    padding:9px 12px; outline:none; transition:border-color 0.2s; -webkit-appearance:none; appearance:none;
  }
  input[type="time"] { font-size:1.25rem; }
  input:focus { border-color:var(--accent); }
  input[type="time"]::-webkit-calendar-picker-indicator,
  input[type="date"]::-webkit-calendar-picker-indicator { filter:invert(1) opacity(0.3); cursor:pointer; }
  .divider { height:1px; background:var(--border); margin:16px 0; }

  button { width:100%; background:var(--accent); color:#0d0f14; border:none; border-radius:10px; font-family:'DM Mono',monospace; font-size:0.8rem; font-weight:500; letter-spacing:0.08em; padding:12px; cursor:pointer; transition:transform 0.1s,opacity 0.2s; text-transform:uppercase; }
  button:active { transform:scale(0.97); opacity:0.85; }
  .reset-btn { background:transparent; color:var(--muted); border:1px solid var(--border); margin-top:9px; font-size:0.68rem; }
  .add-btn { background:transparent; border:1px dashed var(--accent); color:var(--accent); border-radius:10px; padding:9px; font-size:0.7rem; letter-spacing:0.08em; margin-bottom:12px; }
  .add-btn-sub { background:transparent; border:1px dashed rgba(96,212,240,0.5); color:var(--accent2); border-radius:8px; padding:7px; font-size:0.65rem; letter-spacing:0.06em; margin-top:8px; width:100%; }
  .del-btn { width:30px; height:30px; min-width:30px; padding:0; background:transparent; border:1px solid var(--border); border-radius:7px; color:var(--red); font-size:0.9rem; display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .del-btn:active { background:rgba(240,96,96,0.1); transform:scale(0.95); }
  .clear-all-btn { background:transparent; color:var(--red); border:1px solid rgba(240,96,96,0.4); margin-top:9px; font-size:0.68rem; }
  .archive-btn { background:var(--accent3); color:#0d0f14; }

  .result { margin-top:16px; display:none; }
  .result.visible { display:block; }
  .result-card { background:var(--bg); border:1px solid var(--accent); border-radius:14px; padding:16px 18px; animation:fadeUp 0.35s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
  .result-label { font-size:0.6rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); margin-bottom:10px; text-align:center; }
  .result-times { display:flex; gap:10px; margin-bottom:4px; }
  .result-block { flex:1; background:var(--card); border-radius:10px; padding:11px 8px; text-align:center; border:1px solid var(--border); }
  .result-block-label { font-size:0.56rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
  .result-time { font-family:'Fraunces',serif; font-size:clamp(1.5rem,7.5vw,2.2rem); font-weight:600; letter-spacing:-0.02em; line-height:1; }
  .result-time.green { color:var(--accent); } .result-time.blue { color:var(--accent2); } .result-time.orange { color:var(--accent3); }
  .result-sub { margin-top:10px; font-size:0.68rem; color:var(--muted); line-height:1.75; text-align:center; }
  .result-sub span { color:var(--text); }
  .error-msg { background:rgba(240,96,96,0.1); border:1px solid var(--red); border-radius:9px; color:var(--red); font-size:0.7rem; padding:9px 13px; margin-top:12px; text-align:center; display:none; }
  .error-msg.visible { display:block; }

  /* Panel 3 – Aufträge */
  .saved-badge { display:inline-block; background:rgba(200,240,96,0.12); border:1px solid rgba(200,240,96,0.35); color:var(--accent); border-radius:6px; font-size:0.58rem; padding:3px 8px; letter-spacing:0.06em; margin-bottom:12px; }
  .auftrag-block { background:var(--bg); border:1px solid var(--border); border-radius:13px; padding:14px; margin-bottom:14px; animation:fadeUp 0.2s ease; }
  .auftrag-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:13px; }
  .auftrag-title { font-size:0.6rem; color:var(--accent4); letter-spacing:0.1em; text-transform:uppercase; }
  .row2 { display:flex; gap:8px; margin-bottom:13px; }
  .row2 .f { flex:1; }
  .row2 .f label { display:block; font-size:0.58rem; letter-spacing:0.08em; color:var(--muted); text-transform:uppercase; margin-bottom:4px; }
  .zeit-list { margin-top:10px; }
  .zeit-entry { background:var(--card2); border:1px solid var(--border); border-radius:9px; padding:10px 11px; margin-bottom:8px; animation:fadeUp 0.15s ease; }
  .zeit-entry-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .zeit-entry-label { font-size:0.56rem; color:var(--accent2); letter-spacing:0.08em; text-transform:uppercase; }
  .zeit-row { display:flex; gap:5px; }
  .zeit-row .zf { flex:1; min-width:0; }
  .zeit-row .zf label { display:block; font-size:0.56rem; letter-spacing:0.07em; color:var(--muted); text-transform:uppercase; margin-bottom:4px; }
  .zeit-row input[type="time"] { font-size:0.88rem; padding:8px 2px; width:100%; min-width:0; }
  .zeit-row input[type="time"]::-webkit-calendar-picker-indicator { display:none; }
  .datum-btn { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:9px; padding:8px 6px; font-size:0.95rem; color:var(--text); font-family:'DM Mono',monospace; text-align:left; cursor:pointer; min-height:38px; letter-spacing:0; }
  .datum-btn.empty { color:var(--muted); font-size:0.78rem; }
  .datum-btn:active { border-color:var(--accent); }
  .auftrag-result-item { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:13px 15px; margin-bottom:10px; text-align:left; }
  .res-aufnr-label { font-size:0.58rem; color:var(--accent4); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:3px; }
  .res-aufnr-val { font-size:0.9rem; color:var(--text); margin-bottom:2px; }
  .res-desc { font-size:0.65rem; color:var(--muted); margin-bottom:8px; }
  .res-total { font-family:'Fraunces',serif; font-size:1.55rem; color:var(--accent4); font-weight:600; }
  .res-detail { font-size:0.63rem; color:var(--muted); margin-top:6px; line-height:1.65; }
  .res-detail span { color:var(--text); }

  /* Archiv */
  .archiv-empty { color:var(--muted); font-size:0.75rem; text-align:center; padding:20px 0; line-height:1.8; }
  .monat-block { margin-bottom:18px; }
  .monat-header { font-family:'Fraunces',serif; font-size:1.1rem; color:var(--accent); font-weight:300; margin-bottom:10px; padding-bottom:6px; border-bottom:1px solid var(--border); }
  .kw-block { background:var(--bg); border:1px solid var(--border); border-radius:11px; margin-bottom:8px; overflow:hidden; }
  .kw-header { display:flex; justify-content:space-between; align-items:center; padding:11px 14px; cursor:pointer; }
  .kw-title { font-size:0.7rem; color:var(--accent2); letter-spacing:0.08em; text-transform:uppercase; }
  .kw-meta { font-size:0.62rem; color:var(--muted); }
  .kw-arrow { color:var(--muted); font-size:0.7rem; transition:transform 0.2s; }
  .kw-arrow.open { transform:rotate(180deg); }
  .kw-body { display:none; padding:0 14px 12px; border-top:1px solid var(--border); }
  .kw-body.open { display:block; }
  .kw-auftrag { margin-top:10px; }
  .kw-aufnr { font-size:0.62rem; color:var(--accent4); letter-spacing:0.08em; text-transform:uppercase; margin-bottom:2px; }
  .kw-aufnr-val { font-size:0.85rem; color:var(--text); margin-bottom:1px; }
  .kw-desc { font-size:0.63rem; color:var(--muted); margin-bottom:4px; }
  .kw-total { font-family:'Fraunces',serif; font-size:1.3rem; color:var(--accent4); font-weight:600; }
  .kw-detail { font-size:0.62rem; color:var(--muted); line-height:1.6; margin-top:3px; }
  .kw-detail span { color:var(--text); }
  .kw-actions { display:flex; gap:8px; margin-top:10px; }
  .kw-btn { background:transparent; color:var(--muted); border:1px solid var(--border); font-size:0.62rem; padding:6px; flex:1; }
  .kw-btn.red { color:var(--red); border-color:rgba(240,96,96,0.4); }
</style>
</head>
<body>

<header>
  <h1>Arbeits<span>zeit</span></h1>
  <p>Löschen der Cookies und Websitedaten, löscht auch alle Einträge und das Archiv</p>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('feierabend')">&#9200; Feierabend</div>
  <div class="tab" onclick="switchTab('auftraege')">&#128203; Auftr&#228;ge</div>
  <div class="tab" onclick="switchTab('archiv')">&#128193; Archiv</div>
</div>

<!-- Panel 1: Feierabend -->
<div class="panel active" id="panel-feierabend">
  <div class="card">
    <div class="field"><label><span class="dot dot-green"></span>Ankunftszeit</label><input type="time" id="ankunft"/></div>
    <div class="field"><label><span class="dot dot-blue"></span>Start Mittagspause</label><input type="time" id="pauseStart"/></div>
    <div class="field"><label><span class="dot dot-orange"></span>Ende Mittagspause</label><input type="time" id="pauseEnde"/></div>
    <div class="divider"></div>
    <button onclick="berechnen()">Berechnen</button>
    <div class="error-msg" id="errorMsg"></div>
    <div class="result" id="result">
      <div class="result-card">
        <div class="result-label">&#127937; Feierabend um</div>
        <div class="result-times">
          <div class="result-block"><div class="result-block-label">8h 12min</div><div class="result-time green" id="feierabend8h">--:--</div></div>
          <div class="result-block"><div class="result-block-label">9 Stunden</div><div class="result-time blue" id="feierabend9h">--:--</div></div>
        </div>
        <div class="result-sub" id="resultDetails"></div>
      </div>
      <button class="reset-btn" onclick="zuruecksetzen()">Zur&#252;cksetzen</button>
    </div>
  </div>
</div>

<!-- Panel 2: Aufträge -->
<div class="panel" id="panel-auftraege">
  <div class="card">
    <div id="savedBadge" class="saved-badge" style="display:none">&#10003; Automatisch in Websitedaten gespeichert</div>
    <div id="auftragList"></div>
    <button class="add-btn" onclick="addAuftrag()">+ Neuen Auftrag hinzuf&#252;gen</button>
    <div class="divider"></div>
    <button onclick="berechnenAuftraege()">Berechnen &amp; Auswerten</button>
    <div class="error-msg" id="errorMsg3"></div>
    <div class="result" id="result3">
      <div class="result-card" style="text-align:left">
        <div class="result-label" style="text-align:center">&#128203; Auswertung</div>
        <div id="auftragResults"></div>
      </div>
      <button class="reset-btn" onclick="exportText()">&#128228; Als Text kopieren</button>
      <div class="divider"></div>
      <button class="archive-btn" onclick="wocheArchivieren()">&#128193; Woche abschliessen &amp; archivieren</button>
      <button class="clear-all-btn" onclick="clearAllAuftraege()">&#128465; Alle Auftr&#228;ge l&#246;schen</button>
    </div>
  </div>
</div>

<!-- Panel 3: Archiv -->
<div class="panel" id="panel-archiv">
  <div class="card">
    <div id="archivContent"></div>
  </div>
</div>

<script>
// ── Helpers ──────────────────────────────────────────────────
function toMin(v){var p=v.split(':');return parseInt(p[0])*60+parseInt(p[1]);}
function toHHMM(min){var h=Math.floor(min/60)%24,m=min%60;return pad(h)+':'+pad(m);}
function minToHM(min){var h=Math.floor(min/60),m=min%60;return h+'h '+pad(m)+'min';}
function pad(n){return String(n).padStart(2,'0');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
var MONATE=['Jan','Feb','M\u00e4r','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
function datumKurz(iso){
  if(!iso)return'';
  var p=iso.split('-');
  return pad(parseInt(p[2]))+'. '+MONATE[parseInt(p[1])-1];
}

// ── Tabs ─────────────────────────────────────────────────────
function switchTab(name){
  var tabs=['feierabend','auftraege','archiv'];
  var tabEls=document.querySelectorAll('.tab');
  tabs.forEach(function(t,i){
    tabEls[i].classList.toggle('active',t===name);
    document.getElementById('panel-'+t).classList.toggle('active',t===name);
  });
  if(name==='archiv')renderArchiv();
}

// ── Panel 1: Feierabend ──────────────────────────────────────
var FEIER_KEY='feierabend_v1';
function saveFeierabend(){
  try{localStorage.setItem(FEIER_KEY,JSON.stringify({
    ankunft:document.getElementById('ankunft').value,
    pauseStart:document.getElementById('pauseStart').value,
    pauseEnde:document.getElementById('pauseEnde').value
  }));}catch(e){}
}
function loadFeierabend(){
  try{
    var d=localStorage.getItem(FEIER_KEY);
    if(d){var p=JSON.parse(d);
      if(p.ankunft)document.getElementById('ankunft').value=p.ankunft;
      if(p.pauseStart)document.getElementById('pauseStart').value=p.pauseStart;
      if(p.pauseEnde)document.getElementById('pauseEnde').value=p.pauseEnde;
      return true;
    }
  }catch(e){}return false;
}
var now=new Date();
if(!loadFeierabend()){
  document.getElementById('ankunft').value=pad(now.getHours())+':'+pad(now.getMinutes());
}
['ankunft','pauseStart','pauseEnde'].forEach(function(id){
  document.getElementById(id).addEventListener('change',saveFeierabend);
});

function berechnen(){
  var err=document.getElementById('errorMsg'),res=document.getElementById('result');
  err.classList.remove('visible');res.classList.remove('visible');
  var a=document.getElementById('ankunft').value;
  var ps=document.getElementById('pauseStart').value;
  var pe=document.getElementById('pauseEnde').value;
  if(!a||!ps||!pe){err.textContent='Bitte alle drei Zeiten eingeben.';err.classList.add('visible');return;}
  var aM=toMin(a),psM=toMin(ps),peM=toMin(pe);
  if(psM<=aM){err.textContent='Pausenstart muss nach der Ankunft liegen.';err.classList.add('visible');return;}
  if(peM<=psM){err.textContent='Pausenende muss nach dem Pausenstart liegen.';err.classList.add('visible');return;}
  var p=peM-psM;
  document.getElementById('feierabend8h').textContent=toHHMM(aM+(8*60+12)+p);
  document.getElementById('feierabend9h').textContent=toHHMM(aM+9*60+p);
  document.getElementById('resultDetails').innerHTML='Ankunft: <span>'+toHHMM(aM)+'</span><br>Pause: <span>'+toHHMM(psM)+' \u2013 '+toHHMM(peM)+'</span> ('+p+' Min.)';
  res.classList.add('visible');
}
function zuruecksetzen(){
  ['ankunft','pauseStart','pauseEnde'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('result').classList.remove('visible');
  document.getElementById('errorMsg').classList.remove('visible');
  try{localStorage.removeItem(FEIER_KEY);}catch(e){}
}

// ── Panel 2: Aufträge ────────────────────────────────────────
var STORAGE_KEY='auftraege_v2';
var auftraege=[];
var aufId=0,zeitId=0;

function save(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify({auftraege:auftraege,aufId:aufId,zeitId:zeitId}));}catch(e){}
  if(auftraege.length)document.getElementById('savedBadge').style.display='inline-block';
}
function load(){
  try{
    var d=localStorage.getItem(STORAGE_KEY);
    if(d){var p=JSON.parse(d);auftraege=p.auftraege||[];aufId=p.aufId||0;zeitId=p.zeitId||0;}
  }catch(e){}
}

function addAuftrag(){
  aufId++;
  auftraege.push({id:aufId,auftragsnr:'',vorgangsnr:'',beschreibung:'',zeiten:[]});
  save();
  renderAll();
  addZeit(aufId);
}
function removeAuftrag(aid){
  if(!confirm('Auftrag wirklich l\u00f6schen? Alle Zeiteintr\u00e4ge gehen verloren.'))return;
  auftraege=auftraege.filter(function(a){return a.id!==aid;});
  save();renderAll();
}
function addZeit(aid){
  var a=auftraege.find(function(a){return a.id===aid;});
  if(!a)return;
  zeitId++;
  var n=new Date();
  var datum=n.getFullYear()+'-'+pad(n.getMonth()+1)+'-'+pad(n.getDate());
  var von=pad(n.getHours())+':'+pad(n.getMinutes());
  a.zeiten.push({id:zeitId,datum:datum,von:von,bis:''});
  save();renderAll();
}
function removeZeit(aid,zid){
  if(!confirm('Eintrag wirklich l\u00f6schen?'))return;
  var a=auftraege.find(function(a){return a.id===aid;});
  if(!a)return;
  a.zeiten=a.zeiten.filter(function(z){return z.id!==zid;});
  save();renderAll();
}
function updA(aid,field,val){
  var a=auftraege.find(function(a){return a.id===aid;});
  if(a){a[field]=val;save();}
}
function updZ(aid,zid,field,val){
  var a=auftraege.find(function(a){return a.id===aid;});
  if(a){var z=a.zeiten.find(function(z){return z.id===zid;});if(z){z[field]=val;save();}}
}
function updZDatum(aid,zid,val){
  updZ(aid,zid,'datum',val);
  var btn=document.getElementById('dbtn-'+zid);
  if(btn){btn.textContent=val?datumKurz(val):'Datum';btn.className=val?'datum-btn':'datum-btn empty';}
}
function openDatum(zid){
  var el=document.getElementById('di-'+zid);
  if(!el)return;
  try{if(el.showPicker)el.showPicker();else el.click();}catch(e){el.click();}
}

function renderAll(){
  var list=document.getElementById('auftragList');
  list.innerHTML='';
  auftraege.forEach(function(a,ai){
    var div=document.createElement('div');
    div.className='auftrag-block';

    // Build Zeit-Entries
    var zeitDiv=document.createElement('div');
    zeitDiv.className='zeit-list';
    a.zeiten.forEach(function(z,zi){
      var entry=document.createElement('div');
      entry.className='zeit-entry';
      entry.id='zeit-'+z.id;

      var hdr=document.createElement('div');
      hdr.className='zeit-entry-header';
      var lbl=document.createElement('span');
      lbl.className='zeit-entry-label';
      lbl.textContent='Eintrag '+(zi+1);
      hdr.appendChild(lbl);
      if(a.zeiten.length>1){
        var xbtn=document.createElement('button');
        xbtn.className='del-btn';
        xbtn.textContent='\u2715';
        xbtn.setAttribute('data-aid',a.id);
        xbtn.setAttribute('data-zid',z.id);
        xbtn.onclick=function(){removeZeit(parseInt(this.getAttribute('data-aid')),parseInt(this.getAttribute('data-zid')));};
        hdr.appendChild(xbtn);
      }else{
        var ph=document.createElement('div');ph.style.width='30px';hdr.appendChild(ph);
      }
      entry.appendChild(hdr);

      var row=document.createElement('div');
      row.className='zeit-row';

      // Datum field
      var zfD=document.createElement('div');zfD.className='zf';
      var lblD=document.createElement('label');lblD.textContent='Datum';zfD.appendChild(lblD);
      var hiddenDate=document.createElement('input');
      hiddenDate.type='date';
      hiddenDate.id='di-'+z.id;
      hiddenDate.value=z.datum||'';
      hiddenDate.style.cssText='position:absolute;visibility:hidden;width:0;height:0;';
      hiddenDate.setAttribute('data-aid',a.id);
      hiddenDate.setAttribute('data-zid',z.id);
      hiddenDate.onchange=function(){updZDatum(parseInt(this.getAttribute('data-aid')),parseInt(this.getAttribute('data-zid')),this.value);};
      zfD.appendChild(hiddenDate);
      var datBtn=document.createElement('button');
      datBtn.type='button';
      datBtn.id='dbtn-'+z.id;
      datBtn.className=z.datum?'datum-btn':'datum-btn empty';
      datBtn.textContent=z.datum?datumKurz(z.datum):'Datum';
      datBtn.setAttribute('data-zid',z.id);
      datBtn.onclick=function(){openDatum(parseInt(this.getAttribute('data-zid')));};
      zfD.appendChild(datBtn);
      row.appendChild(zfD);

      // Von field
      var zfV=document.createElement('div');zfV.className='zf';
      var lblV=document.createElement('label');lblV.textContent='Von';zfV.appendChild(lblV);
      var inpV=document.createElement('input');inpV.type='time';inpV.value=z.von||'';
      inpV.setAttribute('data-aid',a.id);inpV.setAttribute('data-zid',z.id);
      inpV.oninput=function(){updZ(parseInt(this.getAttribute('data-aid')),parseInt(this.getAttribute('data-zid')),'von',this.value);};
      zfV.appendChild(inpV);row.appendChild(zfV);

      // Bis field
      var zfB=document.createElement('div');zfB.className='zf';
      var lblB=document.createElement('label');lblB.textContent='Bis';zfB.appendChild(lblB);
      var inpB=document.createElement('input');inpB.type='time';inpB.value=z.bis||'';
      inpB.setAttribute('data-aid',a.id);inpB.setAttribute('data-zid',z.id);
      inpB.oninput=function(){updZ(parseInt(this.getAttribute('data-aid')),parseInt(this.getAttribute('data-zid')),'bis',this.value);};
      zfB.appendChild(inpB);row.appendChild(zfB);

      entry.appendChild(row);
      zeitDiv.appendChild(entry);
    });

    // Build Auftrag header
    var hdr2=document.createElement('div');hdr2.className='auftrag-header';
    var title=document.createElement('span');title.className='auftrag-title';title.textContent='Auftrag '+(ai+1);hdr2.appendChild(title);
    var xbtn2=document.createElement('button');xbtn2.className='del-btn';xbtn2.textContent='\u2715';
    xbtn2.setAttribute('data-aid',a.id);
    xbtn2.onclick=function(){removeAuftrag(parseInt(this.getAttribute('data-aid')));};
    hdr2.appendChild(xbtn2);
    div.appendChild(hdr2);

    // Auftragsnr + Vorgangsnr
    var row2=document.createElement('div');row2.className='row2';
    var f1=document.createElement('div');f1.className='f';
    var l1=document.createElement('label');l1.textContent='Auftragsnr.';f1.appendChild(l1);
    var i1=document.createElement('input');i1.type='text';i1.maxLength=8;i1.placeholder='________';i1.value=a.auftragsnr||'';
    i1.setAttribute('data-aid',a.id);i1.oninput=function(){updA(parseInt(this.getAttribute('data-aid')),'auftragsnr',this.value);};
    f1.appendChild(i1);row2.appendChild(f1);
    var f2=document.createElement('div');f2.className='f';
    var l2=document.createElement('label');l2.textContent='Vorgangsnr.';f2.appendChild(l2);
    var i2=document.createElement('input');i2.type='text';i2.maxLength=4;i2.placeholder='____';i2.value=a.vorgangsnr||'';
    i2.setAttribute('data-aid',a.id);i2.oninput=function(){updA(parseInt(this.getAttribute('data-aid')),'vorgangsnr',this.value);};
    f2.appendChild(i2);row2.appendChild(f2);
    div.appendChild(row2);

    // Beschreibung
    var descDiv=document.createElement('div');descDiv.style.marginBottom='13px';
    var descLbl=document.createElement('label');descLbl.style.cssText='display:block;font-size:0.58rem;letter-spacing:0.08em;color:var(--muted);text-transform:uppercase;margin-bottom:4px;';descLbl.textContent='Beschreibung';descDiv.appendChild(descLbl);
    var descInp=document.createElement('input');descInp.type='text';descInp.placeholder='Auftragsbeschreibung...';descInp.value=a.beschreibung||'';
    descInp.setAttribute('data-aid',a.id);descInp.oninput=function(){updA(parseInt(this.getAttribute('data-aid')),'beschreibung',this.value);};
    descDiv.appendChild(descInp);div.appendChild(descDiv);

    div.appendChild(zeitDiv);

    var addZeitBtn=document.createElement('button');addZeitBtn.className='add-btn-sub';addZeitBtn.textContent='+ Weiterer Zeitblock';
    addZeitBtn.setAttribute('data-aid',a.id);
    addZeitBtn.onclick=function(){addZeit(parseInt(this.getAttribute('data-aid')));};
    div.appendChild(addZeitBtn);

    list.appendChild(div);
  });
}

function buildGroups(){
  var groups={};
  auftraege.forEach(function(a){
    var key=a.auftragsnr+'__'+a.vorgangsnr;
    if(!groups[key])groups[key]={auftragsnr:a.auftragsnr,vorgangsnr:a.vorgangsnr,beschreibung:a.beschreibung,eintraege:[],total:0};
    a.zeiten.forEach(function(z){
      var d=toMin(z.bis)-toMin(z.von);
      groups[key].total+=d;
      groups[key].eintraege.push({datum:z.datum,von:z.von,bis:z.bis,dauer:d});
    });
  });
  return groups;
}

function berechnenAuftraege(){
  var err=document.getElementById('errorMsg3'),res=document.getElementById('result3');
  err.classList.remove('visible');res.classList.remove('visible');
  if(!auftraege.length){err.textContent='Bitte mindestens einen Auftrag hinzuf\u00fcgen.';err.classList.add('visible');return;}
  for(var i=0;i<auftraege.length;i++){
    var a=auftraege[i];
    if(!a.auftragsnr||a.auftragsnr.length!==8){err.textContent='Auftrag '+(i+1)+': Auftragsnummer muss 8-stellig sein.';err.classList.add('visible');return;}
    if(!a.vorgangsnr||a.vorgangsnr.length!==4){err.textContent='Auftrag '+(i+1)+': Vorgangsnummer muss 4-stellig sein.';err.classList.add('visible');return;}
    for(var j=0;j<a.zeiten.length;j++){
      var z=a.zeiten[j];
      if(!z.von||!z.bis){err.textContent='Auftrag '+(i+1)+', Eintrag '+(j+1)+': Bitte Von- und Bis-Zeit eingeben.';err.classList.add('visible');return;}
      if(toMin(z.bis)<=toMin(z.von)){err.textContent='Auftrag '+(i+1)+', Eintrag '+(j+1)+': Bis-Zeit muss nach Von-Zeit liegen.';err.classList.add('visible');return;}
    }
  }
  var groups=buildGroups();
  var container=document.getElementById('auftragResults');
  container.innerHTML='';
  Object.values(groups).forEach(function(g){
    var div=document.createElement('div');div.className='auftrag-result-item';
    var details=g.eintraege.map(function(e){return (e.datum?'<span>'+datumKurz(e.datum)+'</span> ':'')+'<span>'+e.von+' \u2013 '+e.bis+'</span> = '+minToHM(e.dauer);}).join('<br>');
    div.innerHTML='<div class="res-aufnr-label">Auftrag</div><div class="res-aufnr-val">'+esc(g.auftragsnr)+' \u00b7 Vorgang <span style="color:var(--accent4)">'+esc(g.vorgangsnr)+'</span></div><div class="res-desc">'+esc(g.beschreibung||'\u2013')+'</div><div class="res-total">'+minToHM(g.total)+'</div><div class="res-detail">'+details+'</div>';
    container.appendChild(div);
  });
  res.classList.add('visible');
}

function exportText(){
  var groups=buildGroups();
  var text='ARBEITSZEITAUSWERTUNG\n'+'='.repeat(30)+'\n\n';
  Object.values(groups).forEach(function(g){
    text+='Auftrag:  '+g.auftragsnr+'\nVorgang:  '+g.vorgangsnr+'\nBeschr.:  '+(g.beschreibung||'\u2013')+'\nGesamt:   '+minToHM(g.total)+'\n';
    g.eintraege.forEach(function(e){text+='  '+(e.datum?datumKurz(e.datum)+' ':'')+e.von+' \u2013 '+e.bis+' = '+minToHM(e.dauer)+'\n';});
    text+='\n';
  });
  try{navigator.clipboard.writeText(text).then(function(){alert('\u2713 Text kopiert!');});}
  catch(e){var ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);alert('\u2713 Text kopiert!');}
}

function clearAllAuftraege(){
  if(!confirm('Wirklich alle Auftr\u00e4ge l\u00f6schen?'))return;
  auftraege=[];aufId=0;zeitId=0;save();renderAll();
  document.getElementById('result3').classList.remove('visible');
  document.getElementById('savedBadge').style.display='none';
}

// ── Archiv ───────────────────────────────────────────────────
var ARCHIV_KEY='archiv_v1';
var archiv=[];
var MONATSNAMEN=['Januar','Februar','M\u00e4rz','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];

function loadArchiv(){try{var d=localStorage.getItem(ARCHIV_KEY);if(d)archiv=JSON.parse(d);}catch(e){}}
function saveArchiv(){try{localStorage.setItem(ARCHIV_KEY,JSON.stringify(archiv));}catch(e){}}

function getKW(iso){
  var d=new Date(iso);d.setHours(0,0,0,0);
  d.setDate(d.getDate()+3-(d.getDay()||7)-3);
  var w=new Date(d.getFullYear(),0,4);
  return 1+Math.round(((d-w)/86400000-3+(w.getDay()||7))/7);
}

function wocheArchivieren(){
  if(!auftraege.length){alert('Keine Auftr\u00e4ge zum Archivieren.');return;}
  if(!confirm('Aktuelle Woche archivieren?\nDie Eintr\u00e4ge bleiben danach noch aktiv.'))return;
  var groups=buildGroups();
  var allDates=[];
  auftraege.forEach(function(a){a.zeiten.forEach(function(z){if(z.datum)allDates.push(z.datum);});});
  allDates.sort();
  var vonDatum=allDates[0]||'';
  var bisDatum=allDates[allDates.length-1]||'';
  var refDate=vonDatum||new Date().toISOString().slice(0,10);
  var kw=getKW(refDate);
  var jahr=new Date(refDate).getFullYear();
  var monat=new Date(refDate).getMonth();
  archiv.push({id:Date.now(),kw:kw,jahr:jahr,monat:monat,datum_von:vonDatum,datum_bis:bisDatum,gruppen:Object.values(groups)});
  saveArchiv();
  alert('\u2713 KW '+kw+' archiviert!');
}

function deleteArchivEntry(id){
  if(!confirm('Archivierten Eintrag wirklich l\u00f6schen?'))return;
  archiv=archiv.filter(function(e){return e.id!==id;});
  saveArchiv();renderArchiv();
}

function exportArchivText(id){
  var entry=archiv.find(function(e){return e.id===id;});
  if(!entry)return;
  var text='ARCHIV KW '+entry.kw+' / '+entry.jahr+'\n'+'='.repeat(30)+'\n\n';
  entry.gruppen.forEach(function(g){
    text+='Auftrag:  '+g.auftragsnr+'\nVorgang:  '+g.vorgangsnr+'\nBeschr.:  '+(g.beschreibung||'\u2013')+'\nGesamt:   '+minToHM(g.total)+'\n';
    g.eintraege.forEach(function(e){text+='  '+(e.datum?datumKurz(e.datum)+' ':'')+e.von+' \u2013 '+e.bis+' = '+minToHM(e.dauer)+'\n';});
    text+='\n';
  });
  try{navigator.clipboard.writeText(text).then(function(){alert('\u2713 Text kopiert!');});}
  catch(e){var ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);alert('\u2713 Text kopiert!');}
}

function toggleKW(id){
  document.getElementById('kwbody-'+id).classList.toggle('open');
  document.getElementById('kwarrow-'+id).classList.toggle('open');
}

function renderArchiv(){
  var container=document.getElementById('archivContent');
  if(!archiv.length){
    container.innerHTML='<div class="archiv-empty">Noch keine archivierten Wochen.<br><br>Eintr\u00e4ge im Tab \u201eAuftr\u00e4ge\u201c erfassen,<br>dann \u201eWoche abschliessen &amp; archivieren\u201c tippen.</div>';
    return;
  }
  var byMonat={};
  var sorted=[].concat(archiv).sort(function(a,b){return b.id-a.id;});
  sorted.forEach(function(e){
    var key=e.jahr+'-'+String(e.monat).padStart(2,'0');
    if(!byMonat[key])byMonat[key]={label:MONATSNAMEN[e.monat]+' '+e.jahr,eintraege:[]};
    byMonat[key].eintraege.push(e);
  });
  container.innerHTML='';
  Object.values(byMonat).forEach(function(m){
    var mDiv=document.createElement('div');mDiv.className='monat-block';
    var mHdr=document.createElement('div');mHdr.className='monat-header';mHdr.textContent=m.label;mDiv.appendChild(mHdr);
    m.eintraege.forEach(function(e){
      var kwLabel=e.datum_von&&e.datum_bis?datumKurz(e.datum_von)+' \u2013 '+datumKurz(e.datum_bis):'KW '+e.kw;
      var kwBlock=document.createElement('div');kwBlock.className='kw-block';
      var kwHdr=document.createElement('div');kwHdr.className='kw-header';
      kwHdr.setAttribute('data-kwid',e.id);
      kwHdr.onclick=function(){toggleKW(parseInt(this.getAttribute('data-kwid')));};
      kwHdr.innerHTML='<div><div class="kw-title">KW '+e.kw+'</div><div class="kw-meta">'+kwLabel+'</div></div><span class="kw-arrow" id="kwarrow-'+e.id+'">\u25bc</span>';
      kwBlock.appendChild(kwHdr);
      var kwBody=document.createElement('div');kwBody.className='kw-body';kwBody.id='kwbody-'+e.id;
      e.gruppen.forEach(function(g){
        var gDiv=document.createElement('div');gDiv.className='kw-auftrag';
        var details=g.eintraege.map(function(en){return (en.datum?'<span>'+datumKurz(en.datum)+'</span> ':'')+'<span>'+en.von+' \u2013 '+en.bis+'</span> = '+minToHM(en.dauer);}).join('<br>');
        gDiv.innerHTML='<div class="kw-aufnr">Auftrag</div><div class="kw-aufnr-val">'+esc(g.auftragsnr)+' \u00b7 Vorgang <span style="color:var(--accent4)">'+esc(g.vorgangsnr)+'</span></div><div class="kw-desc">'+esc(g.beschreibung||'\u2013')+'</div><div class="kw-total">'+minToHM(g.total)+'</div><div class="kw-detail">'+details+'</div>';
        kwBody.appendChild(gDiv);
      });
      var actions=document.createElement('div');actions.className='kw-actions';
      var expBtn=document.createElement('button');expBtn.className='kw-btn';expBtn.textContent='\ud83d\udce4 Kopieren';
      expBtn.setAttribute('data-eid',e.id);expBtn.onclick=function(){exportArchivText(parseInt(this.getAttribute('data-eid')));};
      var delBtn=document.createElement('button');delBtn.className='kw-btn red';delBtn.textContent='\ud83d\uddd1 L\u00f6schen';
      delBtn.setAttribute('data-eid',e.id);delBtn.onclick=function(){deleteArchivEntry(parseInt(this.getAttribute('data-eid')));};
      actions.appendChild(expBtn);actions.appendChild(delBtn);
      kwBody.appendChild(actions);
      kwBlock.appendChild(kwBody);
      mDiv.appendChild(kwBlock);
    });
    container.appendChild(mDiv);
  });
}

// ── Init ─────────────────────────────────────────────────────
load();
loadArchiv();
renderAll();
if(auftraege.length===0)addAuftrag();
</script>
